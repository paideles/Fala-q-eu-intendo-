<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bimo Tradutor Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #16213e;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .mouth-container {
            font-size: 80px;
            margin: 20px 0;
            transition: transform 0.1s;
        }

        .status {
            color: #00d2ff;
            margin-bottom: 20px;
            font-weight: bold;
        }

        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 auto;
        }

        button:hover {
            background: #ff2e63;
            transform: scale(1.05);
        }

        button:disabled {
            background: #555;
        }

        #result {
            margin-top: 20px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            min-height: 50px;
        }

        .animating {
            animation: talk 0.3s infinite;
        }

        @keyframes talk {
            0% { transform: scaleY(1); }
            50% { transform: scaleY(1.5); }
            100% { transform: scaleY(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Bimo Tradutor 🎙️</h2>
        <div class="status" id="status">Pronto para ouvir</div>
        
        <div class="mouth-container" id="mouth">👄</div>

        <button id="btnListen">
            <span>🎤</span> Ouvir e Traduzir
        </button>

        <div id="result">
            <em>A tradução aparecerá aqui...</em>
        </div>
    </div>

    <script>
        const btnListen = document.getElementById('btnListen');
        const statusText = document.getElementById('status');
        const mouth = document.getElementById('mouth');
        const resultDiv = document.getElementById('result');

        // Configuração do Reconhecimento de Voz
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            alert("Desculpe, seu navegador não suporta reconhecimento de voz.");
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; // Define para ouvir Inglês (pode mudar para 'es-ES', etc)
        recognition.interimResults = false;

        btnListen.onclick = () => {
            recognition.start();
            statusText.innerText = "Ouvindo... (Fale agora)";
            btnListen.disabled = true;
        };

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript;
            statusText.innerText = "Traduzindo...";
            
            // Simulação de Tradução (Para produção, usaria uma API como Google Translate)
            // Aqui usamos um truque simples via MyMemory API gratuita:
            const response = await fetch(`https://api.mymemory.translated.net/get?q=${transcript}&langpair=en|pt-BR`);
            const data = await response.json();
            const translation = data.responseData.translatedText;

            resultDiv.innerHTML = `<strong>Original:</strong> ${transcript}<br><strong>Tradução:</strong> ${translation}`;
            
            speak(translation);
        };

        recognition.onspeechend = () => {
            recognition.stop();
            btnListen.disabled = false;
        };

        recognition.onerror = (event) => {
            statusText.innerText = "Erro no microfone!";
            btnListen.disabled = false;
        };

        // Função para a Boca Falar
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.rate = 1.0;

            utterance.onstart = () => {
                mouth.classList.add('animating');
                statusText.innerText = "Bimo falando...";
            };

            utterance.onend = () => {
                mouth.classList.remove('animating');
                statusText.innerText = "Pronto para outra!";
            };

            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
